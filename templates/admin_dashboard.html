<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">🏥 Admin Dashboard</span>
    </div>
</nav>

<div class="container mt-5">

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Patients</h5>
                    <h1 class="text-primary">{{ patients }}</h1>
                    <a href="/patients" class="btn btn-primary w-100">Manage</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Doctors</h5>
                    <h1 class="text-success">{{ doctors }}</h1>
                    <a href="/doctors" class="btn btn-success w-100">Manage</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Appointments</h5>
                    <h1 class="text-warning">{{ appointments }}</h1>
                    <a href="/appointments" class="btn btn-warning w-100">Manage</a>
                </div>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
