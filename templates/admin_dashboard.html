<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container d-flex justify-content-between align-items-center">

        <a class="navbar-brand" href="#">Admin Dashboard</a>

        <div class="nav-links d-flex">
            <a href="/patients" class="btn btn-outline-light btn-sm">Patients</a>
            <a href="/doctors" class="btn btn-outline-light btn-sm">Doctors</a>
            <a href="/appointments" class="btn btn-outline-light btn-sm">Appointments</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>

    </div>
</nav>

<div class="container mt-4">

    <h3 class="mb-4 text-center">Dashboard Overview</h3>

    <div class="dashboard">

        
        <div class="card p-3">
            <h5>Total Patients</h5>
            <h2 class="count text-primary">{{ total_patients }}</h2>
            <a href="/patients" class="btn btn-primary btn-sm mt-2">View</a>
        </div>

     
        <div class="card p-3">
            <h5>Total Doctors</h5>
            <h2 class="count text-success">{{ total_doctors }}</h2>
            <a href="/doctors" class="btn btn-success btn-sm mt-2">View</a>
        </div>

        
        <div class="card p-3">
            <h5>Total Appointments</h5>
            <h2 class="count text-warning">{{ total_appointments }}</h2>
            <a href="/appointments" class="btn btn-warning btn-sm mt-2">View</a>
        </div>

    </div>

</div>

</body>
</html>
