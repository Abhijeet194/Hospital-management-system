<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light">


<nav class="navbar navbar-dark bg-dark">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand">📅 Book Appointment</span>
        <a href="/patient/dashboard" class="btn btn-outline-light">Back</a>
    </div>
</nav>


<div class="container mt-5">

    <div class="card shadow p-4" style="max-width:500px; margin:auto; border-radius:12px;">

        <h4 class="text-center mb-4">Book Appointment</h4>

      
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'success' if category=='success' else 'danger' }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

     
<form method="POST">

    
    <label class="mb-1">Full Name</label>
    <input type="text" name="full_name" placeholder="Enter your full name" class="form-control mb-3" required>

    
    <label class="mb-1">Preferred Date</label>
    <input type="date" name="date" class="form-control mb-3" required>

    <label class="mb-1">Reason / Disease</label>
    <input type="text" name="disease" placeholder="Enter your problem" class="form-control mb-3" required>

    <label>
    <input type="checkbox" name="emergency"> Emergency Appointment 🚨
    </label>

  
    <button class="btn btn-primary w-100">
        Request Appointment
    </button>

</form>
    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
