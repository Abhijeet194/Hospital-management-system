<!DOCTYPE html>
<html>
<head>
    <title>Patient Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h3 class="text-center mb-4">Patient Registration</h3>

    <form method="POST" class="card p-4 shadow">

        <input type="text" name="name" placeholder="Name" class="form-control mb-3" required>
        <input type="number" name="age" placeholder="Age" class="form-control mb-3">
        
        <select name="gender" class="form-control mb-3">
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <hr>

        <input type="text" name="username" placeholder="Username" class="form-control mb-3" required>
        <input type="password" name="password" placeholder="Password" class="form-control mb-3" required>

        <button class="btn btn-primary w-100">Register</button>
    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- YOUR JS -->
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
