<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="login-page">

    <div class="login-box text-center">

        <div class="mb-3">
            <span class="badge rounded-pill bg-primary px-3 py-2">Hospital Management System</span>
        </div>

        <h2 class="mb-2">Select Login Type</h2>
        <p class="mb-4">Choose your role to continue</p>

        <div class="row g-4 justify-content-center">

            <div class="col-12 col-md-4">
                <div class="role-card h-100">
                    <div class="role-icon">🛡️</div>
                    <h5 class="mb-2">Admin</h5>
                    <p class="small mb-3">Manage doctors, patients, and appointments</p>
                    <a href="/admin/login" class="btn btn-primary w-100">Login as Admin</a>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="role-card h-100">
                    <div class="role-icon">👨‍⚕️</div>
                    <h5 class="mb-2">Doctor</h5>
                    <p class="small mb-3">View assigned appointments and patient details</p>
                    <a href="/doctor/login" class="btn btn-success w-100">Login as Doctor</a>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="role-card h-100">
                    <div class="role-icon">👤</div>
                    <h5 class="mb-2">Patient</h5>
                    <p class="small mb-3">Book appointments and check status</p>
                    <a href="/patient/login" class="btn btn-info w-100">Login as Patient</a>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- YOUR JS -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
