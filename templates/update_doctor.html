<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Update Doctor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h3 class="text-center mb-4">Update Doctor</h3>

    <div class="card p-4 shadow" style="max-width: 700px; margin:auto;">

        <form method="POST">

            
            <div class="mb-3">
                <input type="text"
                       name="name"
                       class="form-control"
                       value="{{ doctor[1] }}"
                       placeholder="Doctor Name"
                       required>
            </div>

            
            <div class="mb-3">
                <input type="text"
                       name="specialization"
                       class="form-control"
                       value="{{ doctor[2] or '' }}"
                       placeholder="Specialization">
            </div>

            
            <div class="mb-3">
                <input type="number"
                       name="age"
                       class="form-control"
                       value="{{ doctor[3] or '' }}"
                       placeholder="Age">
            </div>

            
            <div class="mb-3">
                <select name="gender" class="form-control">
                    <option value="">Select Gender</option>
                    <option value="Male" {% if doctor[4]=='Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if doctor[4]=='Female' %}selected{% endif %}>Female</option>
                </select>
            </div>

            <hr>

            <h5 class="text-center mb-3">Login Credentials</h5>

            
            <div class="mb-3">
                <input type="text"
                       name="username"
                       class="form-control"
                       value="{{ user[0] if user else '' }}"
                       placeholder="Username"
                       required>
            </div>

            
            <div class="mb-3">
                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="New Password (leave blank to keep old)">
            </div>

            <button class="btn btn-success w-100">
                Update Doctor
            </button>

        </form>

    </div>

</div>

</body>
</html>
