<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title or "Login - HMS" }}</title>

   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

   
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light">


<nav class="navbar navbar-dark bg-primary shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">🏥 HMS - {{ heading }}</span>
    </div>
</nav>


<div class="container d-flex justify-content-center align-items-center" style="height:80vh;">

    <div class="card shadow p-4" style="width:350px; border-radius:12px;">

        <h4 class="text-center mb-3 fw-semibold">{{ heading }}</h4>

     
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="mb-3">
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'success' if category=='success' else 'danger' }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% endwith %}

       
        <form method="POST" action="{{ action_url }}">

            <input class="form-control mb-2" type="text" name="username" placeholder="Username" required>

            <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

           
            <button class="btn {{ btn_class or 'btn-primary' }} w-100">
                Login
            </button>

        </form>

       

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
