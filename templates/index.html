<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HMS Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light">


<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">🏥 Hospital Management System</span>
    </div>
</nav>


<div class="container text-center mt-5">

    <h1 class="mb-3">Welcome to HMS</h1>
    <p class="text-muted">Manage Patients, Doctors and Appointments efficiently</p>

    <a href="/dashboard" class="btn btn-primary btn-lg mt-3">
        Go to Dashboard
    </a>

</div>


<div class="container mt-5">

    <div class="row g-4 justify-content-center">

        <div class="col-md-3">
            <div class="card shadow text-center border-0">
                <div class="card-body">
                    <h5>👨‍⚕️ Patients</h5>
                    <p class="text-muted">Manage patient records</p>
                    <a href="/patients" class="btn btn-outline-primary w-100">Open</a>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow text-center border-0">
                <div class="card-body">
                    <h5>🩺 Doctors</h5>
                    <p class="text-muted">Manage doctors list</p>
                    <a href="/doctors" class="btn btn-outline-success w-100">Open</a>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow text-center border-0">
                <div class="card-body">
                    <h5>📅 Appointments</h5>
                    <p class="text-muted">Manage schedules</p>
                    <a href="/appointments" class="btn btn-outline-warning w-100">Open</a>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow text-center border-0">
                <div class="card-body">
                    <h5>🔐 Login</h5>
                    <p class="text-muted">Admin access</p>
                    <a href="/login" class="btn btn-outline-dark w-100">Login</a>
                </div>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
